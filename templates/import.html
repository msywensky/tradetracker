{% extends "layout.html" %}
{% block content %}
<section class="panel home-section">
  <h2>Import from Screenshot</h2>
  <p class="muted">Paste a screenshot of your Fidelity order activity (Ctrl/Cmd+V), then review and confirm.</p>

  <div id="paste-zone" tabindex="0" class="paste-zone"
       style="border:2px dashed var(--border, #888); border-radius:8px; padding:24px; text-align:center; cursor:pointer; outline:none;">
    <i class="fa-solid fa-paste"></i>
    <div>Click here and paste an image, or
      <label style="text-decoration:underline; cursor:pointer;">choose a file
        <input id="file-input" type="file" accept="image/png,image/jpeg,image/gif,image/webp" style="display:none;" />
      </label>
    </div>
  </div>

  <div id="preview-image-wrap" style="margin-top:12px; display:none;">
    <img id="preview-image" alt="pasted screenshot" style="max-width:100%; border-radius:6px;" />
  </div>

  <div style="margin-top:12px; display:flex; gap:8px; align-items:center;">
    <button id="extract-btn" type="button" class="btn-compact" disabled>
      <i class="fa-solid fa-wand-magic-sparkles btn-icon"></i> Extract Trades
    </button>
    <span id="status-msg" class="muted"></span>
  </div>
</section>

<section class="panel home-section" id="preview-section" style="display:none;">
  <h2>Review &amp; Import</h2>
  <div id="preview-container"></div>
  <div style="margin-top:12px; display:flex; gap:8px; align-items:center;">
    <button id="add-trade-btn" type="button" class="btn-compact">
      <i class="fa-solid fa-plus btn-icon"></i> Add Trade Manually
    </button>
    <button id="commit-btn" type="button" class="btn-compact">
      <i class="fa-solid fa-floppy-disk btn-icon"></i> Confirm Import
    </button>
    <span id="commit-msg" class="muted"></span>
  </div>
</section>

<script>
const CSRF = document.querySelector('meta[name="csrf-token"]').content;
const ACCOUNTS = [
  {% for account in accounts %}
  { id: {{ account.id }}, short_name: {{ account.short_name | tojson }} },
  {% endfor %}
];

let imageB64 = null;
let imageMediaType = null;

const pasteZone = document.getElementById('paste-zone');
const fileInput = document.getElementById('file-input');
const extractBtn = document.getElementById('extract-btn');
const statusMsg = document.getElementById('status-msg');
const previewImageWrap = document.getElementById('preview-image-wrap');
const previewImage = document.getElementById('preview-image');
const previewSection = document.getElementById('preview-section');
const previewContainer = document.getElementById('preview-container');
const addTradeBtn = document.getElementById('add-trade-btn');
const commitBtn = document.getElementById('commit-btn');
const commitMsg = document.getElementById('commit-msg');

function loadBlob(blob) {
  if (!blob) return;
  imageMediaType = blob.type;
  const reader = new FileReader();
  reader.onload = function () {
    const dataUrl = reader.result;
    imageB64 = String(dataUrl).split(',')[1];
    previewImage.src = dataUrl;
    previewImageWrap.style.display = 'block';
    extractBtn.disabled = false;
    statusMsg.textContent = 'Image ready. Click Extract Trades.';
  };
  reader.readAsDataURL(blob);
}

pasteZone.addEventListener('paste', function (e) {
  const items = (e.clipboardData || window.clipboardData).items;
  for (const item of items) {
    if (item.type && item.type.indexOf('image') === 0) {
      loadBlob(item.getAsFile());
      e.preventDefault();
      return;
    }
  }
  statusMsg.textContent = 'No image found in clipboard.';
});
pasteZone.addEventListener('click', function () { pasteZone.focus(); });
fileInput.addEventListener('change', function () { loadBlob(fileInput.files[0]); });

extractBtn.addEventListener('click', async function () {
  if (!imageB64) return;
  extractBtn.disabled = true;
  statusMsg.textContent = 'Extracting with Claude…';
  try {
    const res = await fetch('/import/screenshot/extract', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF },
      body: JSON.stringify({ image: imageB64, media_type: imageMediaType })
    });
    const data = await res.json();
    if (!res.ok) {
      statusMsg.textContent = 'Error: ' + (data.error || res.statusText);
      extractBtn.disabled = false;
      return;
    }
    renderPreview(data.trades || []);
    statusMsg.textContent = data.trades.length + ' trade(s) found.';
  } catch (err) {
    statusMsg.textContent = 'Request failed: ' + err;
  }
  extractBtn.disabled = false;
});

function accountOptions(selectedId) {
  let html = '<option value="">— choose account —</option>';
  for (const a of ACCOUNTS) {
    const sel = (selectedId !== null && Number(selectedId) === a.id) ? ' selected' : '';
    html += '<option value="' + a.id + '"' + sel + '>' + a.short_name + '</option>';
  }
  return html;
}

function entryRowHtml(side, contracts, price) {
  return '<tr>'
    + '<td><select class="entry-side"><option value="BUY"' + (side === 'BUY' ? ' selected' : '') + '>BUY</option>'
    + '<option value="SELL"' + (side === 'SELL' ? ' selected' : '') + '>SELL</option></select></td>'
    + '<td><input class="entry-contracts" type="number" min="1" value="' + (contracts != null ? contracts : '') + '" style="width:80px;" /></td>'
    + '<td><input class="entry-price" type="number" min="0.01" step="0.01" value="' + (price != null ? price : '') + '" style="width:100px;" /></td>'
    + '<td><button type="button" class="entry-remove btn-compact">Remove</button></td>'
    + '</tr>';
}

function buildTradeCard(trade) {
  const card = document.createElement('div');
  card.className = 'panel';
  card.style.marginBottom = '12px';
  card.dataset.tradeIndex = '1';

  const strikeVal = (trade.strike !== null && trade.strike !== undefined) ? trade.strike : '';
  const expVal = trade.expiration || '';
  const createdVal = (trade.created_at || '').slice(0, 10);
  const optType = trade.option_type === 'PUT' ? 'PUT' : 'CALL';

  let rows = '';
  (trade.entries || []).forEach(function (e) {
    rows += entryRowHtml(e.side, e.contracts, e.price);
  });

  card.innerHTML =
    '<h3><input class="trade-symbol" type="text" value="' + (trade.symbol || '') + '" placeholder="SPY" style="width:90px; text-transform:uppercase;" /></h3>'
    + '<div class="form-grid" style="margin-top:4px;">'
    + '<label>Type<br/><select class="trade-option-type"><option value="CALL"' + (optType === 'CALL' ? ' selected' : '') + '>Call</option>'
    + '<option value="PUT"' + (optType === 'PUT' ? ' selected' : '') + '>Put</option></select></label>'
    + '<label>Strike<br/><input class="trade-strike" type="number" min="0" step="0.01" value="' + strikeVal + '" /></label>'
    + '<label>Expiration<br/><input class="trade-expiration" type="date" value="' + expVal + '" /></label>'
    + '<label>Date<br/><input class="trade-created" type="date" value="' + createdVal + '" /></label>'
    + '</div>'
    + '<label>Account' + (trade.account_label ? ' (matched: ' + trade.account_label + ')' : '') + '<br/>'
    + '<select class="trade-account">' + accountOptions(trade.account_id) + '</select></label>'
    + '<table style="margin-top:8px;"><thead><tr><th>Side</th><th>Contracts</th><th>Price (per-contract)</th><th></th></tr></thead>'
    + '<tbody>' + rows + '</tbody></table>'
    + '<button type="button" class="entry-add btn-compact" style="margin-top:8px;"><i class="fa-solid fa-plus btn-icon"></i> Add entry row</button>'
    + '<label style="display:block; margin-top:8px;">Notes<br/>'
    + '<textarea class="trade-notes" rows="2" style="width:100%; box-sizing:border-box;">' + (trade.notes || '') + '</textarea></label>';

  return card;
}

function renderPreview(trades) {
  previewContainer.innerHTML = '';
  if (!trades.length) {
    previewContainer.innerHTML = '<p class="muted">No qualifying trades found. Use “Add Trade Manually” to enter trades yourself.</p>';
    previewSection.style.display = 'block';
    return;
  }
  trades.forEach(function (trade) {
    previewContainer.appendChild(buildTradeCard(trade));
  });
  previewSection.style.display = 'block';
}

// Delegated handlers for add/remove entry rows on any card.
previewContainer.addEventListener('click', function (e) {
  const addBtn = e.target.closest('.entry-add');
  if (addBtn) {
    const tbody = addBtn.closest('.panel').querySelector('tbody');
    tbody.insertAdjacentHTML('beforeend', entryRowHtml('BUY', '', ''));
    return;
  }
  const removeBtn = e.target.closest('.entry-remove');
  if (removeBtn) {
    const tr = removeBtn.closest('tr');
    if (tr) tr.remove();
  }
});

addTradeBtn.addEventListener('click', function () {
  const card = buildTradeCard({
    symbol: '', option_type: 'CALL', strike: null, expiration: null,
    account_id: null, created_at: '', account_label: null,
    entries: [{ side: 'BUY', contracts: '', price: '' }]
  });
  previewContainer.appendChild(card);
  previewSection.style.display = 'block';
  card.querySelector('.trade-symbol').focus();
});

function collectTrades() {
  const cards = previewContainer.querySelectorAll('[data-trade-index]');
  const trades = [];
  cards.forEach(function (card) {
    const symbol = (card.querySelector('.trade-symbol').value || '').trim().toUpperCase();
    if (!symbol) return;

    const strikeRaw = card.querySelector('.trade-strike').value;
    const strike = strikeRaw === '' ? null : parseFloat(strikeRaw);
    const expiration = card.querySelector('.trade-expiration').value || null;
    const createdRaw = card.querySelector('.trade-created').value;
    const created_at = createdRaw ? createdRaw + ' 00:00:00' : '';
    const accountSel = card.querySelector('.trade-account');

    const entries = [];
    card.querySelectorAll('tbody tr').forEach(function (tr) {
      const contracts = parseInt(tr.querySelector('.entry-contracts').value, 10);
      const price = parseFloat(tr.querySelector('.entry-price').value);
      if (isNaN(contracts) || isNaN(price)) return;
      entries.push({
        side: tr.querySelector('.entry-side').value,
        contracts: contracts,
        price: price,
        created_at: created_at
      });
    });

    trades.push({
      symbol: symbol,
      option_type: card.querySelector('.trade-option-type').value,
      expiration: expiration,
      strike: (strike != null && isNaN(strike)) ? null : strike,
      account_id: accountSel.value ? parseInt(accountSel.value, 10) : null,
      created_at: created_at,
      notes: card.querySelector('.trade-notes').value.trim(),
      entries: entries
    });
  });
  return trades;
}

commitBtn.addEventListener('click', async function () {
  const trades = collectTrades();
  if (!trades.length) { commitMsg.textContent = 'Nothing to import.'; return; }
  commitBtn.disabled = true;
  commitMsg.textContent = 'Importing…';
  try {
    const res = await fetch('/import/screenshot/commit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF },
      body: JSON.stringify({ trades: trades })
    });
    const data = await res.json();
    if (!res.ok) {
      commitMsg.textContent = 'Error: ' + (data.error || res.statusText);
      commitBtn.disabled = false;
      return;
    }
    window.location.href = '/';
  } catch (err) {
    commitMsg.textContent = 'Request failed: ' + err;
    commitBtn.disabled = false;
  }
});
</script>
{% endblock %}
